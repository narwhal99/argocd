apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-auth
spec:
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: kv/database/s3/loki
        property: access_key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: kv/database/s3/loki
        property: access_secret
