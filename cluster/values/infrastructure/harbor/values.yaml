expose:
  tls:
    enabled: true
    secret:
      secretName: "wildcard-bukla-tls"
    certSource: secret
  route:
    parentRefs:
    - kind: Gateway
      name: gateway-internal-eg
      namespace: gateway-envoy
    hosts:
    - "harbor.raymol.com"
externalURL: https://harbor.raymol.com

database:
  type: external
  external:
    host: "vmdocker04.raymol.com"
    port: "5432"
    username: "harbor"
    coreDatabase: "harbor"
    existingSecret: "harbor-secret"

persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      existingClaim: "harbor"
      subPath: "registry"
    jobservice:
      jobLog:
        existingClaim: "harbor"
        subPath: "jobservice"
    redis:
      storageClass: "longhorn"
      size: 1Gi

trivy:
  enabled: false