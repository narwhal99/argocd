httproute:
  enabled: true
  parentRefs:
  - kind: Gateway
    name: gateway-internal-eg
    namespace: gateway-envoy
  hostnames:
    - "longhorn.raymol.com"
  path: /

preUpgradeChecker:
  # -- Setting that allows Longhorn to perform pre-upgrade checks. Disable this setting when installing Longhorn using Argo CD or other GitOps solutions.
  jobEnabled: false

persistence:
  reclaimPolicy: Retain
  defaultClass: false
  defaultClassReplicaCount: 1
  recurringJobSelector:
    enable: true
    jobList: '[{"name":"backup", "isGroup":true}]'

defaultBackupStore:
  backupTarget: nfs://10.20.0.21:/mnt/tank/vault/backups/longhorn
defaultSettings:
  defaultDataPath: /var/longhorn
metrics:
  serviceMonitor:
    enabled: true
#enablePSP: true
