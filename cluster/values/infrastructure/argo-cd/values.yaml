global:
  domain: argocd.raymol.com
server:
  pdb:
    enabled: true
  replicas: 1
  httproute:
    enabled: true
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "argocd.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
configs:
  params:
    controller.sync.timeout.seconds: 1024
    server.insecure: "true"
  rbac:
    policy.csv: | 
      g, authentik Admins, role:admin
  cm:
    create: true
    url: https://argocd.raymol.com
    oidc.config: |
      name: Authentik
      issuer: https://auth.raymol.com/application/o/argocd/
      clientID: oU1vXwPUBb2lxv9QvLTaLIc3na2lpkgVbsAaPdky
      clientSecret: $dex.authentik.clientSecret
      requestedIDTokenClaims:
        groups:
          essential: true
      requestedScopes:
        - openid
        - profile
        - email
