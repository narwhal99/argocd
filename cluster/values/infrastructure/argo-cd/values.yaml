global:
  domain: argocd.raymol.com
controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: "monitoring"
    rules:
      enabled: true
      namespace: "monitoring"
      spec:
        - alert: ArgoAppMissing
          expr: |
            absent(argocd_app_info) == 1
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "[Argo CD] No reported applications"
            description: >
              Argo CD has not reported any applications data for the past 15 minutes which
              means that it must be down or not functioning properly.  This needs to be
              resolved for this cloud to continue to maintain state.
        - alert: ArgoAppNotSynced
          expr: |
            argocd_app_info{sync_status!="Synced"} == 1
          for: 12h
          labels:
            severity: warning
          annotations:
            summary: "[{{ $labels.name }}] Application not synchronized"
            description: >
              The application {{ $labels.name }} has not been synchronized for over
              12 hours which means that the state of this cloud has drifted away from the
              state inside Git.
applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: "monitoring"
server:
  pdb:
    enabled: true
  replicas: 1
  httproute:
    enabled: true
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "argocd.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: "monitoring"
configs:
  params:
    controller.sync.timeout.seconds: 1024
    server.insecure: "true"
  rbac:
    policy.csv: | 
      g, authentik Admins, role:admin
  cm:
    create: true
    url: https://argocd.raymol.com
    oidc.config: |
      name: Authentik
      issuer: https://auth.raymol.com/application/o/argocd/
      clientID: oU1vXwPUBb2lxv9QvLTaLIc3na2lpkgVbsAaPdky
      clientSecret: $dex.authentik.clientSecret
      requestedIDTokenClaims:
        groups:
          essential: true
      requestedScopes:
        - openid
        - profile
        - email
