apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: incoming-proxy-protocol-for-external-gateway
  namespace: gateway-envoy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway-external-eg
  enableProxyProtocol: true
  tcpKeepalive:
    idleTime: 20m
    interval: 60s
    probes: 3
