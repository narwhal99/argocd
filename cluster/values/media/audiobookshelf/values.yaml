---
defaultPodOptions:
  securityContext:
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
    fsGroupChangePolicy: "OnRootMismatch"
    supplementalGroups:
      - 65539

controllers:
  main:
    type: deployment
    containers:
      audiobookshelf:
        image:
          repository: ghcr.io/advplyr/audiobookshelf
          tag: 2.33.2
          pullPolicy: IfNotPresent
service:
  main:
    controller: main
    ports:
      http:
        port: 80

route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "audiobook.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http

persistence:
  config:
    existingClaim: audiobookshelf
    advancedMounts:
      main:
        audiobookshelf:
        - path: /config
          subPath: config
        - path: /metadata
          subPath: metadata
  podcasts:
    type: nfs
    server: 10.20.0.21
    path: /mnt/tank/torrent/books/podcasts
    globalMounts:
      - path: /podcasts
  audiobooks:
    type: nfs
    server: 10.20.0.21
    path: /mnt/tank/torrent/books/audiobooks
    globalMounts:
      - path: /audiobooks
