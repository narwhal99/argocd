---
defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    # runAsUser: 568
    # runAsGroup: 568
    # fsGroup: 568
    fsGroupChangePolicy: "OnRootMismatch"
    # supplementalGroups:
    #   - 65539

controllers:
  main:
    type: deployment
    containers:
      jackett:
        image:
          repository: linuxserver/jackett
          tag: 0.24.1789
          pullPolicy: IfNotPresent

service:
  main:
    controller: main
    ports:
      http:
        port: 9117

route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "jackett.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http

persistence:
  config:
    existingClaim: jackett-conf
    globalMounts:
      - path: /config
  # torrent:
  #   type: nfs
  #   server: 10.20.0.21
  #   path: /mnt/tank/torrent
  #   globalMounts:
  #     - path: /torrent