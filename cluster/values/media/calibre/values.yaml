---
controllers:
    calibre:
      type: deployment
      containers:
        calibre:
          image:
            repository: lscr.io/linuxserver/calibre
            tag: 9.5.0
            pullPolicy: IfNotPresent
service:
  calibre:
    controller: calibre
    type: ClusterIP
    ports:
      http:
        port: 8080

ingress:
  calibre:
    className: "nginx-internal"
    hosts:
      - host: calibre.bukla.hu
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: calibre
              port: http
    tls:
      - hosts:
          - calibre.bukla.hu
        secretName: wildcard-bukla-tls

persistence:
  torrent:
    type: nfs
    server: 10.20.0.21
    path: /mnt/tank/torrent
    globalMounts:
      - path: /torrent
  config:
    existingClaim: calibre-server
    globalMounts:
      - path: /config