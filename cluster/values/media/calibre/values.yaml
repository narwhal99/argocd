---
controllers:
    main:
      type: deployment
      containers:
        calibre:
          image:
            repository: lscr.io/linuxserver/calibre
            tag: 9.7.0
            pullPolicy: IfNotPresent
service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 8080

route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "calibre.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http

persistence:
  torrent:
    type: nfs
    server: 10.20.0.21
    path: /mnt/tank/torrent
    globalMounts:
      - path: /torrent
  config:
    existingClaim: calibre-server
    globalMounts:
      - path: /config