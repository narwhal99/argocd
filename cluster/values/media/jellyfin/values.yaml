---
defaultPodOptions:
  securityContext:
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
    fsGroupChangePolicy: "OnRootMismatch"
    supplementalGroups:
      - 65539

controllers:
  main:
    type: deployment
    containers:
      jellyfin:
        image:
          repository: jellyfin/jellyfin
          tag: 10.11.8
          pullPolicy: IfNotPresent
        resources:
          limits:
            cpu: 3 
            memory: 4Gi
          requests:
            cpu: 1
            memory: 1Gi
service:
  main:
    controller: main
    ports:
      http:
        port: 8096

route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-external-eg
        namespace: gateway-envoy
    hostnames:
      - "jellyfin.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http

persistence:
  torrent:
    type: nfs
    server: 10.20.0.21
    path: /mnt/tank/torrent
    globalMounts:
      - path: /torrent
  config:
    existingClaim: jellyfin-config
  cache:
    existingClaim: jellyfin-cache
  transcode:
    type: emptyDir
