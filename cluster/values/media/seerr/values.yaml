---
defaultPodOptions:
  securityContext:
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
    fsGroupChangePolicy: "OnRootMismatch"
    supplementalGroups:
      - 65539

controllers:
  main:
    type: deployment
    containers:
      seerr:
        image:
          repository: ghcr.io/seerr-team/seerr
          tag: v3.3.0
          pullPolicy: IfNotPresent
service:
  main:
    controller: main
    ports:
      http:
        port: 5055


route:
  internal:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "seerr.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http
  external:
    enabled: true
    kind: HTTPRoute
    annotations:
      external-dns.alpha.kubernetes.io/controller: thiscanbeanything-just-to-be-ignored
    parentRefs:
      - kind: Gateway
        name: gateway-external-eg
        namespace: gateway-envoy
    hostnames:
      - "seerr.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http

persistence:
  config:
    existingClaim: seerr-conf
    globalMounts:
      - path: /app/config
