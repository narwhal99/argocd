---
defaultPodOptions:
  securityContext:
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
    fsGroupChangePolicy: "OnRootMismatch"
    supplementalGroups:
      - 65539

controllers:
  seerr:
    type: deployment
    containers:
      app:
        image:
          repository: ghcr.io/seerr-team/seerr
          tag: v3.2.0
          pullPolicy: IfNotPresent
service:
  app:
    controller: seerr
    ports:
      http:
        port: 5055

ingress:
  app:
    className: "nginx-internal"
    hosts:
      - host: seerr.bukla.hu
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
    tls:
      - hosts:
          - seerr.bukla.hu
        secretName: wildcard-bukla-tls
persistence:
  config:
    existingClaim: seerr-conf
    globalMounts:
      - path: /app/config