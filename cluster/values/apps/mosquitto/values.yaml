---
controllers:
  main:
    type: deployment
    containers:
      mosquitto:
        image:
          repository: eclipse-mosquitto
          tag: 2.0.22
          pullPolicy: IfNotPresent

service:
  main:
    controller: main
    ports:
      mqtt:
        port: 1883
      websocket:
        port: 9001

configMaps:
  config:
    enabled: true
    data:
      config.yaml: |
        allow_anonymous true
        listener 1883
        listener 9001
        protocol websockets
        persistence true
        persistence_file mosquitto.db
        persistence_location /mosquitto/data/

persistence:
  config:
    type: configMap
    identifier: config
    advancedMounts:
      main:
        mosquitto:
        - path: /mosquitto/config/mosquitto.conf
          readOnly: true
          subPath: config.yaml
  data:
    existingClaim: mosquitto
    advancedMounts:
      main:
        mosquitto:
        # - path: /mosquitto/config/
        #   subPath: config
        - path: /mosquitto/data/
          subPath: data
  log:
    type: emptyDir
    advancedMounts:
      main:
        mosquitto:
          - path: /mosquitto/log