---
controllers:
  main:
    containers:
      trek:
        image:
          repository: mauriceboe/trek
          tag: 2.9.14
          pullPolicy: IfNotPresent
        env:
          - name: APP_URL
            value: https://travel.raymol.com
          - name: OIDC_ONLY
            value: true
          - name: OIDC_ISSUER
            value: https://auth.raymol.com/application/o/trek/
          - name: OIDC_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: trek-secret
                key: oidc_client_id
          - name: OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: trek-secret
                key: oidc_client_secret
          - name: OIDC_DISPLAY_NAME
            value: Authentik
          - name: OIDC_SCOPE
            value: openid email profile
          - name: ADMIN_EMAIL
            valueFrom:
              secretKeyRef:
                name: trek-secret
                key: admin_email
          - name: ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: trek-secret
                key: admin_password
service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 3000

route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "travel.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http

persistence:
  data:
    existingClaim: trek
    advancedMounts:
      main:
        trek:
        - path: /app/data
          subPath: data
        - path: /app/uploads
          subPath: uploads
