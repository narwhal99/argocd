---
controllers:
  main:
    containers:
      trek:
        image:
          repository: mauriceboe/trek
          tag: 2.6.2
          pullPolicy: IfNotPresent

service:
  frigate:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 3000

ingress:
  frigate:
    className: "nginx-internal"
    hosts:
      - host: travel.bukla.hu
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: frigate
              port: http
    tls:
      - hosts:
          - travel.bukla.hu
        secretName: wildcard-bukla-tls

persistence:
  data:
    existingClaim: trek
    advancedMounts:
      main:
        trek:
        - path: /app/data
          subPath: data
        - path: /app/uploads
          subPath: uploads