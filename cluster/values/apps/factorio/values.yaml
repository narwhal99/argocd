---
# defaultPodOptions:
#   securityContext:
#     runAsUser: 568
#     runAsGroup: 568
#     fsGroup: 568
#     fsGroupChangePolicy: "OnRootMismatch"
#     supplementalGroups:
#       - 65539

controllers:
    main:
      type: statefulset
      containers:
        factorio:
          image:
            repository: factoriotools/factorio
            tag: stable-2.0.76
            pullPolicy: Always
          env:
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: factorio-secret
                  key: token
            - name: UPDATE_MODS_ON_START
              value: true
            - name: USERNAME
              value: narwhal99
service:
  # Configure a service for the main application
  main:
    controller: main
    type: LoadBalancer
    ports:
      tcp:
        port: 27015
      udp:
        port: 34197
        protocol: UDP
    annotations:
      metallb.universe.tf/allow-shared-ip: 10.20.110.15
      metallb.universe.tf/ip-allocated-from-pool: external
      metallb.universe.tf/loadBalancerIPs: 10.20.110.15

persistence:
  config:
    existingClaim: factorio-conf
    globalMounts:
      - path: /factorio