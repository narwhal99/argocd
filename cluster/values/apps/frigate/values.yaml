---
controllers:
    main:
      type: deployment
      containers:
        frigate:
          image:
            repository: ghcr.io/blakeblackshear/frigate
            tag: 0.17.1
            pullPolicy: IfNotPresent
service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 5000

route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "cam.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http

persistence:
  data:
    existingClaim: frigate
    advancedMounts:
      main:
        frigate:
        - path: /media/frigate
          subPath: records
        - path: /config
          subPath: config
  tmp:
    type: emptyDir
    medium: Memory
    sizeLimit: 1Gi
    advancedMounts:
      main:
        frigate:
        - path: /tmp/
  dshm:
    type: emptyDir
    medium: Memory
    sizeLimit: 1Gi
    advancedMounts:
      main:
        frigate:
        - path: /dev/shm