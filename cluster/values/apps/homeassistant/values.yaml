controllers:
    main:
      type: deployment
      containers:
        homeassistant:
          image:
            repository: homeassistant/home-assistant
            tag: 2026.4.4
            pullPolicy: IfNotPresent
          env:
            - name: DNS_SERVER_DOMAIN
              value: hass.raymol.com
service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 8123

route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "hass.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http

persistence:
  config:
    existingClaim: homeassistant-config
