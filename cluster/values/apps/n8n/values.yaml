image:
  repository: n8nio/n8n
  tag: 2.29.6

main:
  config:
    webhook_url: https://n8n.raymol.com
    n8n:
      editor_base_url: https://n8n.raymol.com
    db:
      type: postgresdb
      postgresdb:
        pool:
          size: 10
  extraEnv:
    DB_POSTGRESDB_DATABASE:
      value: n8n
    DB_POSTGRESDB_HOST:
      value: psql.raymol.com
    N8N_ENCRYPTION_KEY:
      valueFrom:
        secretKeyRef:
          name: n8n-secrets
          key: encryptkey
    DB_POSTGRESDB_USER:
      valueFrom:
        secretKeyRef:
          name: n8n-secrets
          key: psql-user
    DB_POSTGRESDB_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: n8n-secrets
          key: psql-password
  resources:
    limits:
      memory: 2048Mi
    requests:
      memory: 512Mi

# httproute: https://github.com/8gears/n8n-helm-chart/pull/277