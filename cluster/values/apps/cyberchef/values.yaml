---
controllers:
    main:
      type: deployment
      containers:
        homeassistant:
          image:
            repository: mpepping/cyberchef
            tag: v10.24.0
            pullPolicy: IfNotPresent
service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 8000

route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "chef.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http