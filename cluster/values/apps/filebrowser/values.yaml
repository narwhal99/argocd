---
defaultPodOptions:
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 568
    fsGroupChangePolicy: "OnRootMismatch"
    supplementalGroups:
      - 65539

controllers:
    main:
      type: statefulset
      containers:
        filebrowser:
          image:
            repository: docker.io/filebrowser/filebrowser
            tag: v2.63.17
            pullPolicy: IfNotPresent

service:
  # Configure a service for the main application
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 80


route:
  internal:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "file.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http
  external:
    enabled: true
    kind: HTTPRoute
    annotations:
      external-dns.alpha.kubernetes.io/controller: thiscanbeanything-just-to-be-ignored
    parentRefs:
      - kind: Gateway
        name: gateway-external-eg
        namespace: gateway-envoy
    hostnames:
      - "file.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http

persistence:
  database:
    existingClaim: filebrowser-database
    globalMounts:
      - path: /database
  config:
    type: configMap
    name: filebrowser-config
    advancedMounts:
      main: 
        filebrowser: 
          - path: /.filebrowser.json
            readOnly: false
            subPath: settings.json
  data:
    type: nfs
    server: 10.20.0.21
    path: /mnt/tank/media/filebrowser
    globalMounts:
      - path: /srv

configMaps:
      config:
        enabled: true
        data:
          settings.json: |
            {
              "port": 80,
              "baseURL": "",
              "address": "",
              "log": "stdout",
              "database": "/database/filebrowser.db",
              "root": "/srv"
            }
