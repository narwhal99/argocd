---
# defaultPodOptions:
#   securityContext:
#     runAsUser: 568
#     runAsGroup: 568
#     fsGroup: 568
#     fsGroupChangePolicy: "OnRootMismatch"
#     supplementalGroups:
#       - 65539

controllers:
    main:
      type: statefulset
      containers:
        pdfstirling:
          image:
            repository: stirlingtools/stirling-pdf
            tag: 2.9.2
            pullPolicy: IfNotPresent

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 8080

route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "pdf.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http

persistence:
  # trainingData:
  #   type: emptyDir
  #   advancedMounts:
  #     pdfstirling:
  #       - path: /usr/share/tessdata
  config:
    existingClaim: pdfstirling-conf
    globalMounts:
      - path: /configs

