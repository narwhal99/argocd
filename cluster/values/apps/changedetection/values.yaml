---
controllers:
    main:
      type: statefulset
      containers:
        changedetection:
          image:
            repository: lscr.io/linuxserver/changedetection.io
            tag: 0.54.10
            pullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Etc/UTC
            - name: LC_ALL
              value: en_US.UTF-8
            - name: WEBDRIVER_URL
              value: http://localhost:4444/wd/hub
            - name: PLAYWRIGHT_DRIVER_URL
              value: ws://localhost:3000/?stealth=1&--disable-web-security=true
        playwright-chrome:
          image:
            repository: browserless/chrome
            tag: 1.61-chrome-stable
            pullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 1
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 250M
        browser-chrome:
          image:
            repository: selenium/standalone-chrome
            tag: 4
            pullPolicy: IfNotPresent
          env:
            - name: VNC_NO_PASSWORD
              value: 1
          resources:
            limits:
              cpu: 1
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 250M

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 5000

route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - kind: Gateway
        name: gateway-internal-eg
        namespace: gateway-envoy
    hostnames:
      - "scraper.raymol.com"
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: http

persistence:
  config:
    existingClaim: scraper-conf
    advancedMounts:
      main:
        changedetection:
          - path: /config
