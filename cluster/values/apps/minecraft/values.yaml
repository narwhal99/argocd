---
controllers:
    minecraft:
      containers:
        main:
          image:
            repository: itzg/minecraft-server
            tag: 2026.4.2
            pullPolicy: IfNotPresent
          tty: true
          stdin: true
          env:
            - name: VERSION
              value: "26.1.2"
            - name: EULA
              value: true
            - name: INIT_MEMORY
              value: 128m
            - name: MAX_MEMORY
              value: 4096m
            - name: VIEW_DISTANCE
              value: 15
            - name: TZ
              value: Europe/Budapest
            - name: MODE
              value: survival
            - name: DIFFICULTY
              value: hard
            # - name: TYPE
            #   value: "FOLIA"
            # - name: PLUGINS
            #   value: |
            #     https://github.com/sladkoff/minecraft-prometheus-exporter/releases/download/v3.1.2/minecraft-prometheus-exporter-3.1.2.jar
          resources:
            limits:
              cpu: 2
              memory: 4Gi
            requests:
              cpu: 1
              memory: 1Gi
service:
  # prometheus:
  #   controller: minecraft
  #   type: ClusterIP
  #   ports:
  #     http:
  #       port: 9940  
  app:
    controller: minecraft
    type: LoadBalancer
    ports:
      tcp:
        port: 25565
      udp:
        port: 25565
        protocol: UDP
    annotations:
      metallb.universe.tf/allow-shared-ip: 10.20.110.15
      metallb.universe.tf/ip-allocated-from-pool: external
      metallb.universe.tf/loadBalancerIPs: 10.20.110.15

# serviceMonitor:
#   main:
#     enabled: true
#     serviceName: minecraft-prometheus
#     endpoints:
#       - port: http
#         scheme: http
#         path: /metrics
#         scrapeTimeout: 10s
persistence:
  data:
    existingClaim: minecraft-data-202604
    globalMounts:
      - path: /data