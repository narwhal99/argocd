apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustfs
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
  - chart: rustfs
    repoURL: https://charts.rustfs.com
    targetRevision: 0.8.0
    helm:
      valueFiles:
      - $repo/cluster/values/infrastructure/rustfs/values.yaml
      releaseName: rustfs
  - repoURL: git@github.com:narwhal99/argocd.git
    path: cluster/values/infrastructure/rustfs
    targetRevision: master
    ref: repo
  destination:
    name: in-cluster
    namespace: rustfs
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
