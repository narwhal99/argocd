
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: default
  sources:
  - repoURL: registry-1.docker.io/cloudpirates
    chart: redis
    targetRevision: 0.27.4
    helm:
      valueFiles:
      - $repo/cluster/values/infrastructure/redis/values.yaml
      releaseName: redis
  - repoURL: git@github.com:narwhal99/argocd.git
    path: cluster/values/infrastructure/redis
    targetRevision: master
    ref: repo
  destination:
    name: in-cluster
    namespace: redis
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
